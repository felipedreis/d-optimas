- name: Build and Deploy d-optimas Swarm Stack
  hosts: manager
  vars:
    project_dir: "/home/felipeduarte/d-optimas"
    image_name: "felipedreis/d-optimas:2.10"
  tasks:
    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory

    - name: Synchronize source code
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ project_dir }}/"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=.idea"

    - name: List project directory contents
      command: "ls -R {{ project_dir }}"
      register: ls_output

    - name: Show ls output
      debug:
        var: ls_output.stdout_lines

    - name: Ensure python3-pip is installed
      apt:
        name: 
          - python3-pip
        state: present
        update_cache: no
      become: yes

    - name: Install python dependencies with pip
      command: pip3 install jsondiff docker --break-system-packages
      become: yes

    - name: Build Docker image for ARM
      docker_image:
        build:
          path: "{{ project_dir }}"
          dockerfile: "docker/Dockerfile.java21"
        name: "{{ image_name }}"
        source: build
      become: yes

    - name: Copy stack definition
      template:
        src: "../docker/docker-stack.yml"
        dest: "{{ project_dir }}/docker-stack.yml"

    - name: Check Docker Info
      command: docker info
      become: yes
      register: docker_info

    - name: Show Docker Info
      debug:
        var: docker_info.stdout_lines

    - name: Deploy Swarm stack
      shell: docker stack deploy -c {{ project_dir }}/docker-stack.yml d-optimas
      become: yes

- name: Monitor and Collect Results
  hosts: manager
  vars:
    project_dir: "/home/felipeduarte/d-optimas"
  tasks:
    - name: Wait for simulation to finish (check logs or volume)
      pause:
        minutes: 5
      # In a real scenario, we would check for a 'finished' file or use a script

    - name: Fetch results from manager node
      synchronize:
        mode: pull
        src: "{{ project_dir }}/results/"
        dest: "../results-pi/"
