- name: Prepare Raspberry Pi Cluster
  hosts: all
  become: yes
  tasks:
    - name: Install dependencies
      apt:
        name:
          - docker.io
          - python3-pip
        state: present
        update_cache: yes

    - name: Ensure docker python library is installed
      pip:
        name: docker
        state: present

- name: Build and Deploy d-optimas Swarm Stack
  hosts: manager
  vars:
    project_dir: "/home/pi/d-optimas"
    image_name: "felipedreis/d-optimas:2.10"
  tasks:
    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory

    - name: Synchronize source code
      synchronize:
        src: "../"
        dest: "{{ project_dir }}"
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=target"
          - "--exclude=.idea"

    - name: Build Docker image for ARM
      docker_image:
        build:
          path: "{{ project_dir }}"
          dockerfile: docker/Dockerfile.java21
        name: "{{ image_name }}"
        source: build

    - name: Copy stack definition
      template:
        src: "../docker/docker-stack.yml"
        dest: "{{ project_dir }}/docker-stack.yml"

    - name: Deploy Swarm stack
      docker_stack:
        state: present
        name: d-optimas
        compose:
          - "{{ project_dir }}/docker-stack.yml"

- name: Monitor and Collect Results
  hosts: manager
  tasks:
    - name: Wait for simulation to finish (check logs or volume)
      pause:
        minutes: 5
      # In a real scenario, we would check for a 'finished' file or use a script

    - name: Fetch results from manager node
      synchronize:
        mode: pull
        src: "{{ project_dir }}/results/"
        dest: "../results-pi/"
