name: Publish Go Proto Stubs

on:
  push:
    paths:
      - 'src/main/proto/**'
    branches:
      - main
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout d-optimas
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          version: '23.3' # Matches 3.23.3 (new naming convention) or close to 3.22.3

      - name: Install Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.31
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3

      - name: Generate Go Code
        run: |
          mkdir -p gen/go
          protoc --proto_path=src/main/proto \
            --go_out=gen/go --go_opt=paths=source_relative \
            --go-grpc_out=gen/go --go-grpc_opt=paths=source_relative \
            src/main/proto/doptimas.proto

      - name: Checkout doptimas-proto-go
        uses: actions/checkout@v4
        with:
          repository: felipedreis/doptimas-proto-go
          token: ${{ secrets.PROTO_STUB_REPO_TOKEN }}
          path: doptimas-proto-go

      - name: Update doptimas-proto-go
        run: |
          # Ensure api directory exists in the stub repo
          mkdir -p doptimas-proto-go/api
          
          # Copy generated files
          cp gen/go/*.go doptimas-proto-go/api/
          
          cd doptimas-proto-go
          
          # Initialize or update go module
          if [ ! -f go.mod ]; then
            go mod init github.com/felipedreis/doptimas-proto-go
          fi
          go get google.golang.org/protobuf google.golang.org/grpc
          go mod tidy
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Update proto stubs from d-optimas commit ${GITHUB_SHA::7}"
            git push origin main || git push origin master
          else
            echo "No changes to commit"
          fi
